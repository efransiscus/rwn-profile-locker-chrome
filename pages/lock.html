<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>rwn Profile Locked</title>
  <link rel="stylesheet" href="shared.css" />
</head>
<body oncontextmenu="return false;">
  <div class="card" id="card">
    <h1>rwn Profile Locked</h1>
    <p>Enter your PIN to unlock.</p>
    <form id="unlockForm">
      <div class="form-group">
        <label for="pin">PIN</label>
        <input type="password" id="pin" inputmode="numeric" autocomplete="off" maxlength="32" />
      </div>
      <button type="submit" id="unlockBtn">Unlock</button>
      <div class="error" id="error"></div>
      <div class="note" id="countdown"></div>
    </form>
  </div>
  <script type="module" src="lock.js"></script>
</body>
</html>
